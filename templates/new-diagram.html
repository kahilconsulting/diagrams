<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagram Title</title>
<link rel="stylesheet" href="../shared/diagram.css">
<style>
/* Background colour for this diagram */
body{background:#c2d0e0}

/* List every dimmable section here so they animate smoothly */
/* .section-a,.section-b,.section-c{transition:filter 0.35s ease,opacity 0.35s ease} */

/* ── Diagram-specific layout and styles ── */

</style>
</head>
<body>
<!-- Images:
     shared logos/icons  →  ../shared/images/<file>
     diagram screenshots →  ../images/<diagram-slug>/<file>   e.g. ../images/copilot-studio/screenshot.png
-->
<div class="diagram">

  <!-- ═══ YOUR DIAGRAM CONTENT ═══ -->
  <!-- Add data-popup="key" to any element the user can click for a detail popup -->

</div>

<!-- Popup overlay — required, do not remove -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-card" id="popupCard">
    <button class="popup-close" id="popupClose">&#x2715;</button>
    <div class="popup-accent" id="popupAccent"></div>
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-subtitle" id="popupSubtitle"></div>
    <div class="popup-desc" id="popupDesc"></div>
    <div class="popup-body">
      <div>
        <div class="popup-section-label">Key Capabilities</div>
        <ul class="popup-list" id="popupList"></ul>
      </div>
      <div>
        <div class="popup-section-label">Example Scenarios</div>
        <ul class="popup-list" id="popupScenarios"></ul>
      </div>
    </div>
    <div class="popup-screenshots" id="popupScreenshots"></div>
  </div>
</div>

<!-- Legend panel — add one .leg button per dimmable section -->
<div class="legend-panel">
  <span class="legend-title">Focus</span>
  <div class="legend-sep"></div>
  <button class="leg active" data-target="section-a">Section A</button>
  <button class="leg active" data-target="section-b">Section B</button>
  <div class="legend-sep"></div>
  <button class="leg active" id="allBtn">All</button>
</div>

<div class="diagram-brand">
  <span class="diagram-brand-text">Created by</span>
  <img class="diagram-brand-logo" src="../shared/images/KahilConsulting-logo.png" alt="Kahil Consulting">
</div>

<script>
/* Popup content — add one entry per data-popup key used in the HTML above.
   Use points+scenarios for bullet-list popups, or screenshots for image popups (or both). */
var popupData = {
  example: {
    title: 'Example Title',
    subtitle: 'Short subtitle describing the element',
    accent: '#2b7dc2',
    desc: 'Full description paragraph explaining what this element does and why it matters.',
    points: [
      'Capability or feature 1',
      'Capability or feature 2'
    ],
    scenarios: [
      'Real-world scenario showing how this is used',
      'Another concrete example'
    ],
    /* Optional: replace or combine with screenshots */
    screenshots: [
      { src: 'images/<diagram-slug>/screenshot1.jpg', desc: 'Caption shown above the image.' },
      { src: 'images/<diagram-slug>/screenshot2.jpg', desc: 'Caption shown above the image.' }
    ]
  }
};

/* Map CSS class names to popupData keys for elements that can't carry data-popup inline */
/* Example: { 'my-class': 'popupKey', 'another-class': 'anotherKey' } */
var classMap = {};
</script>
<script src="../shared/diagram.js"></script>
</body>
</html>
